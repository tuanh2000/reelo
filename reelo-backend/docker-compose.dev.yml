# Local dev infra: Postgres + Redis. Bring up with:
#   docker compose -f docker-compose.dev.yml up -d
# Matches the defaults in .env.example.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reelo
      POSTGRES_PASSWORD: reelo
      POSTGRES_DB: reelo
    ports:
      - "5432:5432"
    volumes:
      - reelo_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reelo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  reelo_pg:
