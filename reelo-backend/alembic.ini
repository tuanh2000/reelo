# Alembic configuration for Reelo backend.
# The DB URL is read from DATABASE_URL at runtime by db/migrations/env.py
# (this file's sqlalchemy.url is intentionally left blank).

[alembic]
script_location = db/migrations
prepend_sys_path = .
path_separator = os
# version_path_separator unused; single version dir.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
